<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body, html { font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif); }

.weather-container {
  max-width: 600px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
  background: var(--color-background-primary);
}

.search-section {
  margin-bottom: 2rem;
}

.search-box {
  display: flex;
  gap: 0.75rem;
}

.search-box input {
  flex: 1;
  padding: 0.875rem 1rem;
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  font-size: 16px;
  transition: border-color 0.2s;
}

.search-box input:focus {
  outline: none;
  border-color: var(--color-border-secondary);
}

.search-box button {
  padding: 0.875rem 1.5rem;
  background: var(--color-background-info);
  color: var(--color-text-info);
  border: none;
  border-radius: var(--border-radius-md);
  font-weight: 500;
  font-size: 16px;
  cursor: pointer;
  transition: opacity 0.2s;
}

.search-box button:hover:not(:disabled) {
  opacity: 0.9;
}

.search-box button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.weather-card {
  background: var(--color-background-secondary);
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 2rem;
  margin-bottom: 1.5rem;
  display: none;
}

.weather-card.active {
  display: block;
}

.location-name {
  font-size: 18px;
  font-weight: 500;
  color: var(--color-text-primary);
  margin-bottom: 1rem;
}

.temperature-section {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.temp-display {
  font-size: 56px;
  font-weight: 500;
  color: var(--color-text-primary);
  line-height: 1;
}

.condition-icon {
  font-size: 48px;
}

.condition-text {
  font-size: 16px;
  color: var(--color-text-secondary);
}

.weather-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}

.detail-item {
  display: flex;
  flex-direction: column;
}

.detail-label {
  font-size: 13px;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 0.5rem;
}

.detail-value {
  font-size: 18px;
  font-weight: 500;
  color: var(--color-text-primary);
}

.error-message {
  background: var(--color-background-danger);
  color: var(--color-text-danger);
  padding: 1rem;
  border-radius: var(--border-radius-md);
  margin-bottom: 1.5rem;
  display: none;
}

.error-message.active {
  display: block;
}

.loading {
  text-align: center;
  padding: 2rem;
  color: var(--color-text-secondary);
  display: none;
}

.loading.active {
  display: block;
}
</style>

<div class="weather-container">
  <div class="search-section">
    <div class="search-box">
      <input 
        type="text" 
        id="locationInput" 
        placeholder="Enter city name (e.g., London, New York)" 
        autocomplete="off"
      >
      <button id="searchBtn">Search</button>
    </div>
  </div>

  <div class="error-message" id="errorMsg"></div>
  <div class="loading" id="loadingMsg">Fetching weather data...</div>

  <div class="weather-card" id="weatherCard">
    <div class="location-name" id="locationName"></div>
    
    <div class="temperature-section">
      <div>
        <div class="temp-display" id="temperature"></div>
        <div class="condition-text" id="condition"></div>
      </div>
      <div class="condition-icon" id="icon"></div>
    </div>

    <div class="weather-details">
      <div class="detail-item">
        <div class="detail-label">Humidity</div>
        <div class="detail-value" id="humidity"></div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Wind Speed</div>
        <div class="detail-value" id="windSpeed"></div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Feels Like</div>
        <div class="detail-value" id="feelsLike"></div>
      </div>
      <div class="detail-item">
        <div class="detail-label">UV Index</div>
        <div class="detail-value" id="uvIndex"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API_KEY = '81201e6896534e94bdd150415261004';
const API_BASE = 'https://api.weatherapi.com/v1/current.json';

const locationInput = document.getElementById('locationInput');
const searchBtn = document.getElementById('searchBtn');
const weatherCard = document.getElementById('weatherCard');
const errorMsg = document.getElementById('errorMsg');
const loadingMsg = document.getElementById('loadingMsg');

const locationName = document.getElementById('locationName');
const temperature = document.getElementById('temperature');
const condition = document.getElementById('condition');
const icon = document.getElementById('icon');
const humidity = document.getElementById('humidity');
const windSpeed = document.getElementById('windSpeed');
const feelsLike = document.getElementById('feelsLike');
const uvIndex = document.getElementById('uvIndex');

function getWeatherEmoji(iconUrl) {
  if (!iconUrl) return '🌡️';
  
  const url = iconUrl.toLowerCase();
  if (url.includes('sunny') || url.includes('clear')) return '☀️';
  if (url.includes('cloud')) return '☁️';
  if (url.includes('rain')) return '🌧️';
  if (url.includes('snow')) return '❄️';
  if (url.includes('wind')) return '💨';
  if (url.includes('fog') || url.includes('mist')) return '🌫️';
  if (url.includes('thunder')) return '⛈️';
  if (url.includes('overcast')) return '🌥️';
  return '🌡️';
}

async function fetchWeather(location) {
  try {
    errorMsg.classList.remove('active');
    loadingMsg.classList.add('active');
    weatherCard.classList.remove('active');

    const response = await fetch(
      `${API_BASE}?key=${API_KEY}&q=${encodeURIComponent(location)}&aqi=yes`
    );

    if (!response.ok) {
      throw new Error('Location not found. Please try again.');
    }

    const data = await response.json();
    displayWeather(data);
  } catch (error) {
    showError(error.message);
  } finally {
    loadingMsg.classList.remove('active');
  }
}

function displayWeather(data) {
  const current = data.current;
  const loc = data.location;

  locationName.textContent = `${loc.name}, ${loc.country}`;
  temperature.textContent = `${Math.round(current.temp_c)}°C`;
  condition.textContent = current.condition.text;
  icon.textContent = getWeatherEmoji(current.condition.icon);
  humidity.textContent = `${current.humidity}%`;
  windSpeed.textContent = `${current.wind_kph} km/h`;
  feelsLike.textContent = `${Math.round(current.feelslike_c)}°C`;
  uvIndex.textContent = current.uv.toFixed(1);

  weatherCard.classList.add('active');
}

function showError(message) {
  errorMsg.textContent = message;
  errorMsg.classList.add('active');
}

searchBtn.addEventListener('click', () => {
  const location = locationInput.value.trim();
  if (location) {
    fetchWeather(location);
  }
});

locationInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    const location = locationInput.value.trim();
    if (location) {
      fetchWeather(location);
    }
  }
});
</script>
